name: Refresh Data And Deploy Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "assets/**"
      - "data/**"
      - "tools/import-team-data.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/pages-refresh.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Refresh imported data
        run: npm run import

      - name: Commit updated JSON files
        run: |
          if git diff --quiet -- data/team.json data/players.json data/matches.json; then
            echo "No data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/team.json data/players.json data/matches.json
          git commit -m "chore: refresh imported team data"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare deploy artifact
        run: |
          rm -rf dist
          mkdir -p dist/assets dist/data
          cp index.html dist/index.html
          cp -R assets/. dist/assets/
          cp -R data/. dist/data/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
